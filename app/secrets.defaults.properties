# ========================================
# secrets.defaults.properties
# ========================================
# INSTRUCCIONES:
# 1. Copia este archivo como 'secrets.properties' en la raíz del proyecto
# 2. Reemplaza los valores con tus credenciales reales
# 3. NO commits secrets.properties al repositorio (.gitignore ya lo excluye)
#
# Obten la BASE_URL del Apps Script desplegado:
#   - Google Sheets > Extensiones > Apps Script > Deploy > New Deployment
#   - Selecciona "Web app"
#   - Copia la URL generad (parecida a: https://script.google.com/macros/d/{ID}/usercontent)
#
# Obtén la API_KEY configurándola en las Propiedades del Script:
#   - Google Sheets > Extensiones > Apps Script > Proyecto Settings > Properties
#   - Añade: API_KEY = tu_clave_secreta_aqui
# ========================================

# Base URL del Apps Script desplegado
BASE_URL=https://script.google.com/macros/d/{YOUR_DEPLOYMENT_ID}/usercontent

# API KEY configurada en Propiedades del Google Apps Script
API_KEY=your_api_key_here
